# configuration file /etc/nginx/nginx.conf:
events {}

http {
    include       /etc/nginx/mime.types;
    default_type  text/plain;

    server {
        listen 80;
        root /usr/share/nginx/html;
        server_name hmdsi.com;
        location / {
                return 301 https://$host$request_uri;
        }


        }

    server {
        listen 443 ssl;
        server_name hmdsi.com;

        ssl_certificate /etc/letsencrypt/live/hmdsi.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/hmdsi.com/privkey.pem;

        root /usr/share/nginx/html;

        location /.well-known/acme-challenge/ {
                allow all;
                default_type "text/plain";
        }

        location = / {
                return 302 /~home/;
        }

        location ~ ^/(Dockerfile|docker-compose\.yml|nginx\.conf) {
                deny all;
        }

        location /~home {
                alias /usr/share/nginx/html/~home/;
            autoindex on;
            autoindex_exact_size off;
                autoindex_localtime on;

                add_header Content-Type "text/html; charset=utf-8";
                add_after_body /~home/.xerme;

        location ~ \.xerme$ {
                if ($request_uri ~* "^\/~home\/\.xerme$") {
                        return 404;
                }

                add_header Content-Type "text/plain; charset=utf-8";
                add_header Content-Disposition inline;
        }

        location ~\.hmdsi$ {
                add_header Content-Type "text/plain; charset=utf-8";
                add_header Content-Disposition inline;
        }


        location = /~home/quick_links/linkedin.hmdsi {
                return 302 https://www.linkedin.com/company/hmdsi-fit-telkom-university/;
        }

        location = /~home/quick_links/instagram.hmdsi {
                return 302 https://instagram.com/officialhmdsi;
        }

        location = /~home/quick_links/tiktok.hmdsi {
                return 302 https://tiktok.com/@officialhmdsi;
        }

        location = /~home/arcadia_cabinet.hmdsi {
                add_header Content-Type "application/pdf";
                add_header Content-Disposition inline;
        }

        location /~home/structural/ {
                alias /usr/share/nginx/html/~home/structural/;
                autoindex on;
                add_header Content-Type "text/html; charset=utf-8";
                add_after_body /~home/structural/.xerme;
        }

        location /~home/quick_links/ {
                alias /usr/share/nginx/html/~home/quick_links/;
                autoindex on;
                add_header Content-Type "text/html; charset=utf-8";
                add_after_body /~home/quick_links/.xerme;
        }

            # PAKSA semua file .hmdsi jadi Plain Text
            location ~ \.(?!\.pdf\.hmdsi|txt)$ {
                add_header Content-Type "text/plain; charset=utf-8";
                add_header Contect-Disposition inline;
            }
        }
    }
}